name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npm run build

      - name: Vitest
        # --no-file-parallelism: three suites (embedder, search, index-pipeline)
        # share the Xenova/all-MiniLM-L6-v2 model. Running them in parallel
        # races on the download and corrupts the ONNX file with a protobuf
        # parse error. Serial test-file execution lets the first download
        # win and the rest reuse the cached model.
        run: npx vitest run --no-file-parallelism
